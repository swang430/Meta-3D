[pytest]
# Pytest configuration for MIMO-First API service integration tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for organizing tests
markers =
    integration: Integration tests requiring running services
    unit: Unit tests for isolated components
    slow: Slow running tests
    road_test: Virtual Road Test feature tests
    api: API endpoint tests
    websocket: WebSocket streaming tests

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (if pytest-cov is installed)
# addopts = --cov=app --cov-report=html --cov-report=term
